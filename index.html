// Top-level cumulative + per-day rollup (visible on both tabs).
(function summaryBar() {
  const S = DATA.summary;

})();

(function perWorkBoxes() {

let body = DATA.order.map(wid => {
  const t = DATA.works[wid].title;
  const cells = DATA.metrics.map(m => {
    const L = DATA.latest[wid][m[0]];
    if (L.val === null) return '<td>—</td>';
    const d = L.delta;
    const dtxt = (d > 0 ? '+' + d : d === 0 ? '·' : d);
    const cls = d === 0 ? 'delta zero' : 'delta';
    return `<td>${L.val.toLocaleString()} <span class="${cls}">${dtxt}</span></td>`;
  }).join('');
  return `<tr><td>${t}</td>${cells}</tr>`;
}).join('');
sum.innerHTML = head + body + '</tbody>';

// One chart per metric, a line per work. Toggle: absolute date vs days-since-pub.
const charts = document.getElementById('charts');
const zoomEl = document.getElementById('zoom');
const panEl = document.getElementById('pan');
const zoomVal = document.getElementById('zoomval');
let chartObjs = [];
let curNorm = false;

// Full x-extent across every series, in the current mode's units
// (ms for dates, days for normalized).
function computeDomain(normalized) {
  let lo = Infinity, hi = -Infinity;
  DATA.order.forEach(wid => {
    const pub = DATA.pub[wid] ? new Date(DATA.pub[wid]).getTime() : null;
    DATA.metrics.forEach(([k]) => DATA.works[wid].series[k].forEach(([x]) => {
      const v = normalized ? (pub === null ? null : (new Date(x).getTime() - pub) / 86400000)
                           : new Date(x).getTime();
      if (v === null) return;
      if (v < lo) lo = v;
      if (v > hi) hi = v;
    }));
  });
  if (!isFinite(lo)) { lo = 0; hi = 1; }
  return [lo, hi];
}

// Map the zoom (window width %) + pan (position %) sliders onto every chart's x-axis.
function applyView() {
  const [d0, d1] = computeDomain(curNorm);
  const span = (d1 - d0) || 1;
  const zoom = +zoomEl.value, pan = +panEl.value;
  const w = span * zoom / 100;
  const start = d0 + (pan / 100) * (span - w);
  zoomVal.textContent = zoom + '%';
  panEl.disabled = zoom >= 100;
  localStorage.setItem('ao3zoom', zoom);
  localStorage.setItem('ao3pan', pan);
  chartObjs.forEach(c => {
    c.options.scales.x.min = start;
    c.options.scales.x.max = start + w;
    c.update('none');
  });
}

function render(normalized) {
  curNorm = normalized;
  chartObjs.forEach(c => c.destroy());
  chartObjs = [];
  charts.innerHTML = '';

  const firstPubMs = DATA.firstPub ? new Date(DATA.firstPub).getTime() : null;
  const sfx = normalized ? 'by age' : 'over time';

  // Map [iso,val] points to {x,y}; in normalized mode x = days since `pubMs`.
  const mapSeries = (series, pubMs) => series.map(([x, y]) => {
    if (!normalized) return {x, y};
    if (pubMs === null) return null;
    return {x: (new Date(x).getTime() - pubMs) / 86400000, y};
  }).filter(Boolean);

  const xScale = normalized
    ? { type: 'linear', min: 0,
        title: { display: true, text: 'Days since publication', color: '#8b949e' },
        ticks: { color: '#8b949e' }, grid: { color: '#1f262e' } }
    : { type: 'time', time: { tooltipFormat: 'MMM d, h:mm a' },
        ticks: { color: '#8b949e', maxRotation: 0 }, grid: { color: '#1f262e' } };

  // Faint dashed line + title at each publication date (date mode only).
  function pubAnnotations() {
    const annotations = {};
    if (normalized) return annotations;
    DATA.order.forEach(wid => {
      if (!DATA.pub[wid]) return;
      const at = new Date(DATA.pub[wid]).getTime();
      annotations['pub_' + wid] = {
        type: 'line', xMin: at, xMax: at,
        borderColor: 'rgba(230,237,243,0.22)', borderWidth: 1, borderDash: [4, 4],
        label: { display: true, content: DATA.works[wid].title, position: 'start',
                 rotation: -90, color: 'rgba(230,237,243,0.45)',
                 backgroundColor: 'rgba(0,0,0,0)', font: { size: 10 }, padding: 2 },
      };
    });
    return annotations;
  }

  function makeChart(title, datasets) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h2>${title}</h2><canvas></canvas>`;
    charts.appendChild(card);
    chartObjs.push(new Chart(card.querySelector('canvas'), {
      type: 'line',
      data: { datasets },
      options: {
        animation: false, responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: false },
        scales: { x: xScale,
          y: { beginAtZero: false, ticks: { color: '#8b949e' }, grid: { color: '#1f262e' } } },
        plugins: {
          legend: { labels: { color: '#c9d1d9', boxWidth: 12, font: { size: 11 } } },
          tooltip: normalized ? { callbacks: {
            title: items => 'Day ' + Number(items[0].parsed.x).toFixed(1),
          } } : {},
          annotation: { annotations: pubAnnotations() },
        },
      },
    }));
  }

  // Account-total charts first (sum across all works), then per-work metrics.
  [['hits', 'Total Hits', '#4e9bff'], ['kudos', 'Total Kudos', '#42d392']].forEach(([key, label, color]) => {
    makeChart(`${label} ${sfx} (account)`, [{
      label, data: mapSeries(DATA.totals[key] || [], firstPubMs),
      borderColor: color, backgroundColor: color,
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: 0.15,
    }]);
  });

  DATA.metrics.forEach(([key, label]) => {
    const datasets = DATA.order.map((wid, i) => ({
      label: DATA.works[wid].title,
      data: mapSeries(DATA.works[wid].series[key],
                      DATA.pub[wid] ? new Date(DATA.pub[wid]).getTime() : null),
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: PALETTE[i % PALETTE.length],
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: 0.15,
    })).filter(d => d.data.length);
    makeChart(`${label} ${sfx}`, datasets);
  });

  applyView();
}

// Restore persisted controls so the periodic <meta> refresh keeps your view.
const cb = document.getElementById('normalize');
cb.checked = localStorage.getItem('ao3norm') === '1';
if (localStorage.getItem('ao3zoom')) zoomEl.value = localStorage.getItem('ao3zoom');
if (localStorage.getItem('ao3pan')) panEl.value = localStorage.getItem('ao3pan');

cb.addEventListener('change', () => {
  localStorage.setItem('ao3norm', cb.checked ? '1' : '0');
  panEl.value = cb.checked ? 0 : 100;   // anchor: launch (normalized) vs most-recent (dates)
  render(cb.checked);
});
zoomEl.addEventListener('input', applyView);
panEl.addEventListener('input', applyView);
document.getElementById('reset').addEventListener('click', () => {
  zoomEl.value = 100;
  panEl.value = cb.checked ? 0 : 100;
  applyView();
});
render(cb.checked);

// --- Data tab: scrollable table of every recorded point (newest first) ---
const num = v => v === null ? '—' : v.toLocaleString();
(function buildDataTable() {
  const rows = DATA.rows.slice().reverse();
  const head = '<thead><tr><th>Time (ET)</th><th>Work</th><th class="num">Hits</th>' +
    '<th class="num">Kudos</th><th>Src</th></tr></thead>';
  const body = '<tbody>' + rows.map(r => {
    const t = new Date(r.t).toLocaleString('en-US',
      {month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'});
    return `<tr><td>${t}</td><td>${r.title}</td><td class="num">${num(r.hits)}</td>` +
           `<td class="num">${num(r.kudos)}</td><td class="src">${r.source}</td></tr>`;
  }).join('') + '</tbody>';
  document.getElementById('datatable').innerHTML = head + body;
})();

const tabEls = document.querySelectorAll('.tab');
function activate(name) {
  document.getElementById('panel-charts').hidden = name !== 'charts';
  document.getElementById('panel-data').hidden = name !== 'data';
  tabEls.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  localStorage.setItem('ao3tab', name);
  if (name === 'charts') chartObjs.forEach(c => c.resize());  // canvases sized while hidden
}
tabEls.forEach(t => t.addEventListener('click', () => activate(t.dataset.tab)));
activate(localStorage.getItem('ao3tab') || 'charts');

// Data only changes at the top of each hour. Reload once, a few minutes after
// the next HH:00 pull lands — not on a blind short loop.
(function scheduleReload() {
  const now = new Date();
  const next = new Date(now);
  next.setMinutes(0, 0, 0);
  next.setHours(now.getHours() + 1);
  const target = next.getTime() + 3 * 60 * 1000;
  document.getElementById('next').textContent =
    new Date(target).toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
  setTimeout(() => location.reload(), target - now.getTime());
})();
</script>
</body>
