name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage site files
        # Publish only the site itself (index.html + .nojekyll), not .git/.github.
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/ 2>/dev/null || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      # The Pages deploy backend intermittently returns "Deployment failed, try
      # again later." Retry in-workflow (reusing the one uploaded artifact) so a
      # transient blip self-heals instead of failing the run. Do NOT re-run the
      # whole job to fix a failure — that re-uploads the artifact and trips the
      # "Multiple artifacts named github-pages" error.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      # Second retry with a longer backoff — observed backend bursts can outlast
      # the first window (two "try again later" failures 36s apart on 2026-07-04).
      - name: Wait before second retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 120
      - name: Deploy to GitHub Pages (second retry)
        id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
